<!--
  THIS FILE IS NOT A DESIGN REFERENCE — it's a working integration example.
  It calls the REAL, deployed FastAPI backend (VegasCryptoAgent/marketing-automation,
  running on Railway) instead of mock state. Endpoints, request/response shapes,
  and job-status polling are copied verbatim from that repo's main.py + orchestrator.py.

  DEPLOYMENT: this file is meant to be bundled into one self-contained HTML file
  and dropped in as `static/index.html` in that repo, replacing the existing
  frontend — main.py already serves static/index.html at "/" and mounts
  /static, so once this file lives there, all API_BASE-relative fetch() calls
  below resolve same-origin and no CORS configuration is needed at all.
-->

<script type="text/babel">
const { Button, GlassCard, Badge, Tabs, Input, Textarea, Select, Switch, Checkbox, ProgressStepper, DropZone, TrendCard, Spinner } = window.TrendPilotAIDesignSystem_1ab598;

// Same-origin: this file is meant to replace static/index.html in the
// marketing-automation repo, served by the same FastAPI app it calls — so
// API_BASE is empty (relative paths) and no CORS config is needed at all.
const API_BASE = "";

async function apiFetch(path, options) {
  const res = await fetch(API_BASE + path, options);
  if (!res.ok) {
    let detail = res.statusText;
    try { const j = await res.json(); detail = j.detail || detail; } catch (e) {}
    throw new Error(`${res.status} ${detail}`);
  }
  return res.json();
}

async function pollJob(statusPath, jobId, onTick, { intervalMs = 1800, timeoutMs = 180000 } = {}) {
  const started = Date.now();
  while (true) {
    const data = await apiFetch(`${statusPath}/${jobId}`);
    onTick(data);
    if (data.status === 'SUCCESS' || data.status === 'FAILED') return data;
    if (Date.now() - started > timeoutMs) throw new Error('Polling timed out');
    await new Promise((r) => setTimeout(r, intervalMs));
  }
}

/* Connection banner: pings /api/settings on mount so CORS/network failures are visible immediately, not buried inside a screen action. */
function ConnectionBanner() {
  const [state, setState] = React.useState('checking'); // checking | ok | error
  const [detail, setDetail] = React.useState('');

  React.useEffect(() => {
    apiFetch('/api/settings')
      .then(() => setState('ok'))
      .catch((e) => { setState('error'); setDetail(e.message); });
  }, []);

  if (state === 'ok') return null;

  return (
    <div style={{ background: state === 'checking' ? 'rgba(139,92,246,0.12)' : 'rgba(244,63,94,0.12)', borderBottom: `1px solid ${state === 'checking' ? 'rgba(139,92,246,0.3)' : 'rgba(244,63,94,0.3)'}`, padding: '0.75rem 3rem', fontSize: '0.85rem', color: 'var(--text-primary)' }}>
      {state === 'checking' && <span>Checking connection to the backend (same-origin)…</span>}
      {state === 'error' && (
        <span>
          <strong>Can't reach the backend</strong> ({detail || 'network error'}). If you're viewing this file standalone (not served by the FastAPI app itself), API_BASE is empty here so it needs to be served from the same origin as the API — drop this in as your repo's <code>static/index.html</code> per the README.
        </span>
      )}
    </div>
  );
}

const NAV_ITEMS = [

  { value: 'trends', label: 'Viral Trends & Recreation' },

  { value: 'pipeline', label: 'Upload & Analyze Video' },
];

function Header({ view, onNavigate }) {

        PILOT <span style={{ fontWeight: 400, fontSize: '0.95rem', color: 'var(--text-secondary)' }}>AI</span>
      </div>

}

/* =======================================================================
   UPLOAD & ANALYZE — POST /api/upload -> POST /api/analyze -> poll /api/status/{job_id}
   Result shape: { brief: {video_summary, key_themes, brand_alignment, visual_style_tags},
                    copy: {linkedin_post, twitter_post, twitter_thread, instagram_caption, suggested_hashtags} }
   ======================================================================= */
const PIPELINE_ICONS = {
  upload: (<svg viewBox="0 0 24 24" width="44" height="44" stroke="currentColor" strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>),
};

function PipelineScreen() {
  const [pickedFile, setPickedFile] = React.useState(null);
  const [videoPath, setVideoPath] = React.useState(null);
  const [websiteUrl, setWebsiteUrl] = React.useState('https://trendpilot.ai/');
  const [status, setStatus] = React.useState(null); // {status, progress, message}
  const [result, setResult] = React.useState(null);
  const [error, setError] = React.useState(null);
  const [tab, setTab] = React.useState('linkedin');
  const fileInputRef = React.useRef(null);

  async function handleFilePicked(file) {
    setPickedFile(file);
    setError(null);
    try {
      const form = new FormData();
      form.append('file', file);
      const data = await apiFetch('/api/upload', { method: 'POST', body: form });
      setVideoPath(data.video_path);
    } catch (e) {
      setError('Upload failed: ' + e.message);
    }
  }

  async function runPipeline() {
    setError(null);
    setResult(null);
    try {
      const { job_id } = await apiFetch('/api/analyze', {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ video_path: videoPath, website_url: websiteUrl }),
      });
      const final = await pollJob('/api/status', job_id, setStatus);
      if (final.status === 'SUCCESS') setResult(final.result);
      else setError(final.message || 'Pipeline failed.');
    } catch (e) {
      setError(e.message);
    }
  }

  const running = status && status.status === 'PROCESSING';
  const done = !!result;

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '360px 1fr', gap: '2rem' }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
        <h2 style={{ fontFamily: 'var(--font-display)', fontSize: '1.4rem' }}>Upload Visual Asset</h2>
        <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Upload a video asset and run the real multi-agent pipeline (Gemini 2.5 Pro context agent + Gemini 2.5 Flash copy agent).</p>

        <input ref={fileInputRef} type="file" accept="video/*" style={{ display: 'none' }} onChange={(e) => e.target.files[0] && handleFilePicked(e.target.files[0])} />
        {!pickedFile ? (
          <div onClick={() => fileInputRef.current.click()}>
            <DropZone label="Drag & drop your cinematic MP4 file here" icon={PIPELINE_ICONS.upload} />
          </div>
        ) : (
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'rgba(255,255,255,0.04)', padding: '0.75rem 1rem', borderRadius: 'var(--radius-md)', border: '1px solid var(--border-color)' }}>
            <span style={{ fontSize: '0.9rem', color: 'var(--text-primary)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', maxWidth: 200 }}>{pickedFile.name}{!videoPath && ' (uploading…)'}</span>
            <button onClick={() => { setPickedFile(null); setVideoPath(null); setResult(null); }} style={{ background: 'none', border: 'none', color: 'var(--error-color)', cursor: 'pointer', fontWeight: 500, fontSize: '0.9rem', textDecoration: 'underline' }}>Remove</button>
          </div>
        )}

        <Input label="Target Website / Campaign URL" value={websiteUrl} onChange={(e) => setWebsiteUrl(e.target.value)} />
        <Button variant="primary" glow disabled={!videoPath || running} onClick={runPipeline} style={{ width: '100%', padding: '1rem' }}>
          {running ? 'Orchestrating agents…' : 'Generate Social Campaigns'}
        </Button>
        {error && <div style={{ color: 'var(--error-color)', fontSize: '0.8rem' }}>{error}</div>}

        {status && (
          <GlassCard>
            <h3 style={{ fontFamily: 'var(--font-display)', fontSize: '1rem', marginBottom: '1rem' }}>Multi-Agent Orchestration Status</h3>
            <ProgressStepper
              percent={status.progress}
              statusMessage={status.message}
              steps={[
                { label: 'Asset Uploading', state: status.progress >= 20 ? 'completed' : 'active' },
                { label: 'Context Agent (Gemini Pro)', state: status.progress >= 65 ? 'completed' : status.progress >= 20 ? 'active' : 'pending' },
                { label: 'Copy Agents (Gemini Flash)', state: status.progress >= 90 ? 'completed' : status.progress >= 65 ? 'active' : 'pending' },
                { label: 'Staged for Review', state: done ? 'completed' : 'pending' },
              ]}
            />
          </GlassCard>
        )}
      </div>

      <section>
        {!done ? (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: 480, border: '1px solid var(--border-color)', borderRadius: 'var(--radius-lg)', background: 'var(--surface-card)', color: 'var(--text-secondary)', textAlign: 'center', padding: '4rem 2rem' }}>
            <svg viewBox="0 0 24 24" width="64" height="64" stroke="currentColor" strokeWidth="1" fill="none" strokeLinecap="round" strokeLinejoin="round" style={{ color: 'rgba(255,255,255,0.1)', marginBottom: '1.5rem' }}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
            <h3 style={{ fontFamily: 'var(--font-display)', fontSize: '1.4rem', color: 'var(--text-primary)', marginBottom: '0.5rem' }}>Staging Environment</h3>
            <p style={{ maxWidth: 400, fontSize: '0.95rem', lineHeight: 1.5 }}>Upload a video asset and run the agents to generate real, Gemini-written platform copy.</p>
          </div>
        ) : (
          <GlassCard>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2rem' }}>
              <div>
                <label style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', fontWeight: 500 }}>Context Brief (Gemini 2.5 Pro)</label>
                <Textarea rows={5} readOnly value={result.brief.video_summary} style={{ marginTop: '0.5rem' }} />
                <div style={{ marginTop: '0.75rem' }}>
                  <span style={{ fontSize: '0.75rem', color: 'var(--text-secondary)', display: 'block', marginBottom: '0.4rem' }}>Key Themes</span>
                  <div style={{ display: 'flex', gap: '0.4rem', flexWrap: 'wrap' }}>
                    {result.brief.key_themes.map((t) => <span key={t} style={{ background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.1)', borderRadius: 20, padding: '0.25rem 0.7rem', fontSize: '0.75rem' }}>{t}</span>)}
                  </div>
                </div>
              </div>
              <div style={{ display: 'flex', flexDirection: 'column' }}>
                <Tabs active={tab} onChange={setTab} items={[{ value: 'linkedin', label: 'LinkedIn' }, { value: 'twitter', label: 'Twitter / X' }, { value: 'instagram', label: 'Instagram' }]} />
                <div style={{ marginTop: '1rem', flex: 1 }}>
                  {tab === 'linkedin' && <Textarea rows={9} defaultValue={result.copy.linkedin_post} />}
                  {tab === 'twitter' && <Textarea rows={9} defaultValue={result.copy.twitter_thread.join('\n\n')} />}
                  {tab === 'instagram' && <Textarea rows={9} defaultValue={result.copy.instagram_caption + '\n\n' + result.copy.suggested_hashtags.map(h => '#' + h.replace(/^#/, '')).join(' ')} />}
                </div>
                <div style={{ display: 'flex', gap: '1rem', marginTop: '1rem' }}>
                  <Button variant="secondary">Copy Post</Button>
                  <Button variant="primary" onClick={() => apiFetch('/api/publish/' + (tab === 'twitter' ? 'twitter' : 'linkedin'), { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(tab === 'twitter' ? { text: result.copy.twitter_post, is_thread: false } : { text: result.copy.linkedin_post }) }).catch((e) => setError(e.message))}>Publish</Button>
                </div>
              </div>
            </div>
          </GlassCard>
        )}
      </section>
    </div>
  );
}

/* =======================================================================
   VIRAL TRENDS — POST /api/viral-search -> poll /api/viral-status/{job_id}
   Result shape: { trends: [ {platform, url, author, title, viral_metrics,
     recreated_video_prompt, recreated_linkedin_post, recreated_twitter_thread,
     recreated_instagram_caption, ...} ] }
   ======================================================================= */
function TrendsScreen() {
  const [scanning, setScanning] = React.useState(false);
  const [status, setStatus] = React.useState(null);
  const [trends, setTrends] = React.useState(null);
  const [active, setActive] = React.useState(null);
  const [ctab, setCtab] = React.useState('linkedin');
  const [error, setError] = React.useState(null);

  async function runScan() {
    setScanning(true);
    setError(null);
    try {
      const { job_id } = await apiFetch('/api/viral-search', { method: 'POST' });
      const final = await pollJob('/api/viral-status', job_id, setStatus, { timeoutMs: 240000 });
      if (final.status === 'SUCCESS') {
        setTrends(final.result.trends);
        setActive(final.result.trends[0]);
      } else {
        setError(final.message || 'Scan failed.');
      }
    } catch (e) {
      setError(e.message);
    } finally {
      setScanning(false);
    }
  }

  return (
    <div>
      <div style={{ marginBottom: '1.5rem', borderBottom: '1px solid var(--border-color)', paddingBottom: '0.5rem' }}>
        <h2 style={{ fontFamily: 'var(--font-display)', fontSize: '1.4rem', display: 'inline' }}>Live Trends Scanner</h2>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: '360px 1fr', gap: '2rem' }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
          <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Runs a real Gemini 2.5 Pro Google-Search-grounded scan across Reddit/YouTube/X for the last 24h — takes 30-90s.</p>
          <Button variant="primary" glow onClick={runScan} disabled={scanning} style={{ width: '100%' }}>
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            {scanning ? 'Scanning…' : 'Scan Social Trends'}
          </Button>
          {error && <div style={{ color: 'var(--error-color)', fontSize: '0.8rem' }}>{error}</div>}
          {scanning && (
            <GlassCard style={{ padding: '1.2rem', textAlign: 'center' }}>
              <div style={{ marginBottom: '0.5rem' }}><Spinner /></div>
              <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>{status ? status.message : 'Starting…'}</p>
            </GlassCard>
          )}
          {trends && !scanning && trends.map((t, i) => (
            <TrendCard key={i} thumbnail="" title={t.title} subtitle={t.original_concept ? t.original_concept.slice(0, 90) + '…' : t.viral_metrics} platform={t.platform} active={active === t} onClick={() => setActive(t)} />
          ))}
        </div>
        <div>
          {!active ? (
            <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: 480, border: '1px solid var(--border-color)', borderRadius: 'var(--radius-lg)', background: 'var(--surface-card)', color: 'var(--text-secondary)', textAlign: 'center', padding: '4rem 2rem' }}>
              <h3 style={{ fontFamily: 'var(--font-display)', fontSize: '1.4rem', color: 'var(--text-primary)', marginBottom: '0.5rem' }}>Live Trend Staging</h3>
              <p style={{ maxWidth: 400 }}>Trigger the scanner to find real-time viral concepts.</p>
            </div>
          ) : (
            <GlassCard>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2rem' }}>
                <div>
                  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: '0.75rem', color: 'var(--text-secondary)', marginBottom: '0.75rem' }}>
                    <span>{active.author} · {active.platform}</span>
                    <a href={active.url} target="_blank" rel="noreferrer" style={{ color: 'var(--primary-color)', textDecoration: 'underline' }}>Open Original ↗</a>
                  </div>
                  <label style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', fontWeight: 500 }}>Image-to-Video Motion Prompt</label>
                  <Textarea rows={5} readOnly value={active.recreated_video_prompt} style={{ marginTop: '0.5rem' }} />
                </div>
                <div style={{ display: 'flex', flexDirection: 'column' }}>
                  <Tabs active={ctab} onChange={setCtab} items={[{ value: 'linkedin', label: 'LinkedIn' }, { value: 'twitter', label: 'Twitter / X' }, { value: 'instagram', label: 'Instagram' }]} />
                  <div style={{ marginTop: '1rem', flex: 1 }}>
                    {ctab === 'linkedin' && <Textarea rows={9} defaultValue={active.recreated_linkedin_post} />}
                    {ctab === 'twitter' && <Textarea rows={9} defaultValue={active.recreated_twitter_thread.join('\n\n')} />}
                    {ctab === 'instagram' && <Textarea rows={9} defaultValue={active.recreated_instagram_caption} />}
                  </div>
                  <div style={{ display: 'flex', gap: '1rem', marginTop: '1rem' }}>
                    <Button variant="secondary">Copy Post</Button>
                    <Button variant="primary">Publish</Button>
                  </div>
                </div>
              </div>
            </GlassCard>
          )}
        </div>
      </div>
    </div>
  );
}

/* =======================================================================
   REPURPOSER — POST /api/repurpose-video-link (copy) + POST /api/load-original-video (yt-dlp scrape, polled)
   ======================================================================= */
function RepurposerScreen() {
  const [url, setUrl] = React.useState('');
  const [running, setRunning] = React.useState(false);
  const [copy, setCopy] = React.useState(null);
  const [videoStatus, setVideoStatus] = React.useState(null);
  const [videoPath, setVideoPath] = React.useState(null);
  const [tab, setTab] = React.useState('linkedin');
  const [error, setError] = React.useState(null);

  async function run() {
    setRunning(true);
    setError(null);
    setCopy(null);
    setVideoPath(null);
    try {
      const [copyResult, videoJob] = await Promise.all([
        apiFetch('/api/repurpose-video-link', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url }) }),
        apiFetch('/api/load-original-video', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ url }) }),
      ]);
      setCopy(copyResult.data);
      const finalVideo = await pollJob('/api/video-status', videoJob.job_id, setVideoStatus, { timeoutMs: 120000 });
      if (finalVideo.status === 'SUCCESS') setVideoPath(finalVideo.result.video_path);
    } catch (e) {
      setError(e.message);
    } finally {
      setRunning(false);
    }
  }

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '360px 1fr', gap: '2rem' }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
        <h2 style={{ fontFamily: 'var(--font-display)', fontSize: '1.4rem' }}>Repurposer Workshop</h2>
        <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>Paste a public video link — runs real Gemini search-grounding for attributed copy, plus a yt-dlp scrape in parallel.</p>
        <Input label="Pasted Original Video Link" placeholder="https://www.youtube.com/watch?v=..." value={url} onChange={(e) => setUrl(e.target.value)} />
        <Button variant="primary" glow onClick={run} disabled={running || !url} style={{ width: '100%' }}>{running ? 'Analyzing…' : 'Analyze & Scrape Video'}</Button>
        {error && <div style={{ color: 'var(--error-color)', fontSize: '0.8rem' }}>{error}</div>}
      </div>
      <section>
        {running && !copy ? (
          <GlassCard style={{ textAlign: 'center', padding: '3rem 2rem' }}>
            <div style={{ marginBottom: '1rem' }}><Spinner /></div>
            <p style={{ fontSize: '0.85rem', color: 'var(--text-secondary)' }}>{videoStatus ? videoStatus.message : 'Running Search Grounding…'}</p>
          </GlassCard>
        ) : !copy ? (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', minHeight: 480, border: '1px solid var(--border-color)', borderRadius: 'var(--radius-lg)', background: 'var(--surface-card)', color: 'var(--text-secondary)', textAlign: 'center', padding: '4rem 2rem' }}>
            <h3 style={{ fontFamily: 'var(--font-display)', fontSize: '1.4rem', color: 'var(--text-primary)', marginBottom: '0.5rem' }}>Repurposing Workspace</h3>
            <p style={{ maxWidth: 400 }}>Paste a video link and analyze it to load real, attributed commentary here.</p>
          </div>
        ) : (
          <GlassCard>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '2rem' }}>
              <div>
                <div style={{ fontSize: '0.85rem', color: 'var(--primary-color)', marginBottom: '0.5rem' }}>{copy.author}</div>
                {videoPath ? (
                  <video src={API_BASE + videoPath} controls style={{ width: '100%', borderRadius: 'var(--radius-md)', border: '1px solid var(--border-color)', marginBottom: '1rem' }} />
                ) : (
                  <div style={{ width: '100%', height: 200, borderRadius: 'var(--radius-md)', border: '1px solid var(--border-color)', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-secondary)', fontSize: '0.8rem', marginBottom: '1rem' }}>
                    {videoStatus ? videoStatus.message : 'Video downloading…'}
                  </div>
                )}
                <label style={{ fontSize: '0.85rem', color: 'var(--text-secondary)', fontWeight: 500 }}>Scraped Original Copy</label>
                <Textarea rows={4} readOnly value={copy.original_post_text} style={{ marginTop: '0.5rem' }} />
              </div>
              <div style={{ display: 'flex', flexDirection: 'column' }}>
                <Tabs active={tab} onChange={setTab} items={[{ value: 'linkedin', label: 'LinkedIn' }, { value: 'twitter', label: 'Twitter / X' }, { value: 'instagram', label: 'Instagram' }]} />
                <div style={{ marginTop: '1rem', flex: 1 }}>
                  {tab === 'linkedin' && <Textarea rows={9} defaultValue={copy.repurposed_linkedin_post} />}
                  {tab === 'twitter' && <Textarea rows={9} defaultValue={copy.repurposed_twitter_thread.join('\n\n')} />}
                  {tab === 'instagram' && <Textarea rows={9} defaultValue={copy.repurposed_instagram_caption} />}
                </div>
                <div style={{ display: 'flex', gap: '1rem', marginTop: '1rem' }}>
                  <Button variant="secondary">Copy Post</Button>
                  <Button variant="primary" disabled={!videoPath}>Publish</Button>
                </div>
              </div>
            </div>
          </GlassCard>
        )}
      </section>
    </div>
  );
}

/* =======================================================================
   COCKPIT — GET/POST /api/settings, GET /api/scheduled-queue, POST /api/trigger-autopilot
   ======================================================================= */
function CockpitScreen() {
  const [settings, setSettings] = React.useState(null);
  const [queue, setQueue] = React.useState(null);
  const [tab, setTab] = React.useState('overview');
  const [error, setError] = React.useState(null);
  const [saving, setSaving] = React.useState(false);

  React.useEffect(() => {
    apiFetch('/api/settings').then(setSettings).catch((e) => setError(e.message));
    apiFetch('/api/scheduled-queue').then(setQueue).catch((e) => setError(e.message));
  }, []);

  async function saveSettings(next) {
    setSaving(true);
    try {
      await apiFetch('/api/settings', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(next) });
      setSettings(next);
    } catch (e) {
      setError(e.message);
    } finally {
      setSaving(false);
    }
  }

  async function runAutopilotNow() {
    try {
      await apiFetch('/api/trigger-autopilot', { method: 'POST' });
    } catch (e) {
      setError(e.message);
    }
  }

  if (!settings) return <div style={{ color: 'var(--text-secondary)', padding: '2rem' }}>{error || 'Loading settings from backend…'}</div>;

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '360px 1fr', gap: '2rem' }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: '1rem' }}>
        <Badge tone="primary" style={{ alignSelf: 'flex-start' }}>TrendPilot AI Autopilot</Badge>
        <h2 style={{ fontFamily: 'var(--font-display)', fontSize: '1.4rem' }}>Autopilot Control</h2>
        <div style={{ background: 'rgba(255,255,255,0.02)', padding: '0.8rem', borderRadius: 'var(--radius-md)', border: '1px solid var(--border-color)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: '0.85rem', fontWeight: 600 }}>Enable Autopilot</span>
            <Switch checked={settings.autonomous_posting} onChange={() => saveSettings({ ...settings, autonomous_posting: !settings.autonomous_posting })} />
          </div>
        </div>
        <div style={{ display: 'flex', gap: '1.5rem', background: 'rgba(0,0,0,0.2)', padding: '0.75rem', borderRadius: 'var(--radius-md)', border: '1px solid var(--border-color)' }}>
          <Checkbox checked={settings.autonomous_platforms.includes('twitter')} onChange={() => { const p = settings.autonomous_platforms.includes('twitter') ? settings.autonomous_platforms.filter(x => x !== 'twitter') : [...settings.autonomous_platforms, 'twitter']; saveSettings({ ...settings, autonomous_platforms: p }); }} label="Twitter / X" />
          <Checkbox checked={settings.autonomous_platforms.includes('linkedin')} onChange={() => { const p = settings.autonomous_platforms.includes('linkedin') ? settings.autonomous_platforms.filter(x => x !== 'linkedin') : [...settings.autonomous_platforms, 'linkedin']; saveSettings({ ...settings, autonomous_platforms: p }); }} label="LinkedIn" />
        </div>
        <Button variant="primary" glow style={{ width: '100%' }} onClick={runAutopilotNow} disabled={saving}>Run Autopilot Pipeline Now</Button>
        {error && <div style={{ color: 'var(--error-color)', fontSize: '0.8rem' }}>{error}</div>}
      </div>
      <section>
        <GlassCard>
          <Tabs active={tab} onChange={setTab} items={[{ value: 'overview', label: 'Overview' }, { value: 'credentials', label: 'Credentials' }, { value: 'queue', label: 'Queue' }]} />
          {tab === 'credentials' && (
            <div style={{ marginTop: '1.5rem' }}>
              <h3 style={{ fontFamily: 'var(--font-display)', fontSize: '1.1rem', marginBottom: '1.25rem' }}>Capabilities & Credentials</h3>
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '0.75rem', marginBottom: '1.5rem' }}>
                {[['Gemini', !!settings.gemini_api_key], ['Runway', !!settings.runway_api_key], ['Twitter/X', !!settings.twitter_access_token], ['LinkedIn', !!settings.linkedin_access_token]].map(([label, act]) => (
                  <div key={label} style={{ background: 'rgba(255,255,255,0.02)', border: '1px solid var(--border-color)', borderRadius: 'var(--radius-md)', padding: '0.75rem', display: 'flex', flexDirection: 'column', gap: '0.4rem' }}>
                    <span style={{ fontSize: '0.75rem', color: 'var(--text-secondary)' }}>{label}</span>
                    <Badge tone={act ? 'success' : 'error'} style={{ fontSize: '0.6rem', alignSelf: 'flex-start' }}>{act ? 'CONFIGURED' : 'MISSING'}</Badge>
                  </div>
                ))}
              </div>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1rem', marginBottom: '1.25rem' }}>
                <Input label="Gemini API Key" type="password" defaultValue={settings.gemini_api_key} onBlur={(e) => saveSettings({ ...settings, gemini_api_key: e.target.value })} />
                <Input label="Runway API Key" type="password" defaultValue={settings.runway_api_key} onBlur={(e) => saveSettings({ ...settings, runway_api_key: e.target.value })} />
              </div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'rgba(139, 92, 246, 0.08)', border: '1px solid rgba(139, 92, 246, 0.2)', padding: '0.85rem', borderRadius: 'var(--radius-md)' }}>
                <span style={{ fontWeight: 600, fontSize: '0.85rem' }}>Mock Publish Mode (safe testing, no real posts)</span>
                <Switch checked={settings.mock_mode} onChange={() => saveSettings({ ...settings, mock_mode: !settings.mock_mode })} />
              </div>
            </div>
          )}
          {tab === 'queue' && (
            <div style={{ marginTop: '1.5rem' }}>
              <h3 style={{ fontFamily: 'var(--font-display)', fontSize: '1.1rem', marginBottom: '1rem' }}>Automation Queue</h3>
              {(!queue || queue.length === 0) ? (
                <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem' }}>No scheduled posts.</p>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: '0.75rem' }}>
                  {queue.map((p) => (
                    <div key={p.id} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', background: 'rgba(255,255,255,0.02)', border: '1px solid var(--border-color)', borderRadius: 'var(--radius-md)', padding: '0.75rem' }}>
                      <span style={{ fontSize: '0.85rem' }}>{p.campaign_title}</span>
                      <Badge tone={p.status === 'SUCCESS' ? 'success' : p.status === 'FAILED' ? 'error' : 'primary'} style={{ fontSize: '0.6rem' }}>{p.status}</Badge>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
          {tab === 'overview' && (
            <div style={{ marginTop: '1.5rem' }}>
              <h1 style={{ fontFamily: 'var(--font-display)', fontSize: '1.6rem', fontWeight: 700, marginBottom: '0.5rem' }}>Automatic Social Media Marketing Hub</h1>
              <p style={{ color: 'var(--text-secondary)', fontSize: '0.9rem', maxWidth: 560 }}>Autopilot is currently {settings.autonomous_posting ? 'ON' : 'OFF'}, posting hour {settings.autonomous_hour}:00, targeting: {settings.autonomous_platforms.join(', ') || 'none'}.</p>
            </div>
          )}
        </GlassCard>
      </section>
    </div>
  );
}

function App() {
  const [view, setView] = React.useState('trends');
  return (
    <React.Fragment>
      <ConnectionBanner />
      <Header view={view} onNavigate={setView} />
      <main className="app-container">
        {view === 'cockpit' && <CockpitScreen />}
        {view === 'trends' && <TrendsScreen />}
        {view === 'repurposer' && <RepurposerScreen />}
        {view === 'pipeline' && <PipelineScreen />}
      </main>
    </React.Fragment>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
